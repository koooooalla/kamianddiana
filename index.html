<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>meme factory</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bangers&family=Black+Han+Sans&family=Do+Hyeon&family=Gamja+Flower&family=Gothic+A1:wght@900&family=Hi+Melody&family=Jua&family=Lobster&family=Nanum+Brush+Script&family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@900&family=Oswald:wght@700&family=Pacifico&family=Permanent+Marker&family=Press+Start+2P&family=Righteous&family=Roboto+Condensed:wght@700&family=Song+Myung&family=Yeon+Sung&family=Nanum+Gothic:wght@800&family=Nanum+Myeongjo:wght@800&family=Poor+Story&family=Single+Day&family=Sunflower:wght@700&family=Gaegu&display=swap" rel="stylesheet">
    <style>
        :root { --white: #FFFFFF; --black: #000000; --bar-height: 46px; --ui-font-size: 1.1rem; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Arial Narrow", Arial, sans-serif; -webkit-tap-highlight-color: transparent; outline: none !important; }
        body, html { width: 100%; height: 100vh; color: var(--black); overflow: hidden; background: #fff; -webkit-font-smoothing: antialiased; text-transform: lowercase; }
        .scene { display: none; width: 100vw; height: 100vh; position: relative; }
        .scene.active { display: flex; }
        .pane { flex: 1; height: 100vh; overflow-y: auto; position: relative; scrollbar-width: none; transition: background-color 0.4s ease-out, width 0.3s ease; border: none !important; }
        .pane::-webkit-scrollbar { display: none; }
        .top-bar-area { display: flex; align-items: center; gap: 8px; padding: 12px 15px; position: sticky; top: 0; z-index: 1000; }
        .nav-pill-wrapper { position: relative; flex: 1; }
        .white-pill { background: var(--white); border-radius: 50px; height: var(--bar-height); padding: 0 18px; display: flex; justify-content: space-between; align-items: center; font-size: var(--ui-font-size); cursor: pointer; width: 100%; border: none; appearance: none; -webkit-appearance: none; font-weight: normal; }
        .dropdown-menu { display: none; position: absolute; top: 50px; left: 0; width: 100%; background: var(--white); border-radius: 15px; overflow: hidden; box-shadow: 0 8px 16px rgba(0,0,0,0.1); z-index: 2000; }
        .dropdown-menu.show { display: block; }
        .dropdown-item { padding: 12px 18px; font-size: var(--ui-font-size); cursor: pointer; border-bottom: 1px solid #f0f0f0; font-weight: normal; }
        .dropdown-item:hover { background: #f9f9f9; }
        .control-btns { display: flex; gap: 6px; }
        .circle-btn { background: rgba(255,255,255,1); border: none !important; width: var(--bar-height); height: var(--bar-height); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; cursor: pointer; color: var(--black); box-shadow: none !important; }
        .content-body { padding: 40px 20px; }
        .big-title { font-size: 3.8rem; line-height: 0.95; letter-spacing: -2px; margin-bottom: 30px; font-weight: normal; }
        .btn-large { display: flex; align-items: center; justify-content: center; padding: 0 40px; border-radius: 50px; background: var(--white); border: none !important; font-size: var(--ui-font-size); cursor: pointer; margin-top: 20px; font-family: inherit; color: var(--black); height: var(--bar-height); width: auto; font-weight: normal; box-shadow: none !important; }
        .archive-grid { display: grid; gap: 15px; padding: 0 20px 40px 20px; position: relative; z-index: 100; }
        .grid-cols-full { grid-template-columns: repeat(5, 1fr); }
        .meme-icon-card { aspect-ratio: 1/1; background: #eee; border-radius: 0px; overflow: hidden; cursor: pointer; border: none; position: relative; }
        .meme-icon-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .editor-box { display: flex; flex-direction: column; gap: 16px; padding: 0 20px 60px 20px; align-items: center; }
        .input-pill { width: 100%; max-width: 400px; padding: 0 20px; border-radius: 50px; border: none; font-size: var(--ui-font-size); background: #fff; font-family: inherit; height: var(--bar-height); font-weight: normal; }
        .canvas-container { width: 100%; max-width: 400px; aspect-ratio: 1/1; background: #000; position: relative; overflow: hidden; flex-shrink: 0; border: none; }
        .canvas-container img { width: 100%; height: 100%; object-fit: cover; }
        .meme-text { position: absolute; width: 100%; text-align: center; color: white; font-weight: 900; font-size: 2rem; text-transform: uppercase; padding: 10px; pointer-events: none; -webkit-text-stroke: 1.5px black; paint-order: stroke fill; line-height: 1.1; word-wrap: break-word; }
        .t-top { top: 5px; }
        .t-bottom { bottom: 5px; }
        .view-mode-tabs { display: flex; gap: 8px; padding: 0 20px 20px 20px; position: relative; z-index: 1001; }
        .tab-btn { background: rgba(255,255,255,1); border: none !important; padding: 0 20px; border-radius: 20px; cursor: pointer; font-size: var(--ui-font-size); height: 36px; font-weight: normal; box-shadow: none !important; }
        .tab-btn.active { background: var(--white); text-decoration: underline; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="scene-home" class="scene active">
        <div class="pane" id="pane-home">
            <div class="top-bar-area">
                <div class="nav-pill-wrapper">
                    <div class="white-pill" onclick="toggleDrop('drop-home')"><span>home</span><span>↓</span></div>
                    <div id="drop-home" class="dropdown-menu">
                        <div class="dropdown-item" onclick="go('scene-home')">home</div>
                        <div class="dropdown-item" onclick="go('scene-create')">create</div>
                        <div class="dropdown-item" onclick="go('scene-archive')">archive</div>
                    </div>
                </div>
            </div>
            <div class="content-body">
                <h1 class="big-title">welcome to meme factory.</h1>
                <button class="btn-large" onclick="go('scene-create')">play</button>
            </div>
        </div>
    </div>

    <div id="scene-create" class="scene">
        <div class="pane" id="create-left" style="width: 50%;">
            <div class="top-bar-area">
                <div class="nav-pill-wrapper">
                    <div class="white-pill" onclick="toggleDrop('drop-create')"><span>create</span><span>↓</span></div>
                    <div id="drop-create" class="dropdown-menu">
                        <div class="dropdown-item" onclick="go('scene-home')">home</div>
                        <div class="dropdown-item" onclick="go('scene-archive')">archive</div>
                    </div>
                </div>
            </div>
            <div class="content-body"><h1 class="big-title">choose a picture.</h1></div>
        </div>
        <div class="pane" id="create-right" style="width: 50%;">
            <div id="create-grid-view" class="archive-grid grid-cols-full" style="padding-top:20px;"></div>
            <div id="create-editor-view" class="hidden">
                <div class="top-bar-area"><div class="control-btns"><button class="circle-btn" onclick="hideEditor()">←</button></div></div>
                <div class="editor-box">
                    <div class="canvas-container"><img id="edit-img"><div id="p-top" class="meme-text t-top"></div><div id="p-bottom" class="meme-text t-bottom"></div></div>
                    <input type="text" id="in-nick" class="input-pill" placeholder="nickname">
                    <input type="text" id="in-top" class="input-pill" placeholder="top text" oninput="sync('p-top', this.value)">
                    <input type="text" id="in-bottom" class="input-pill" placeholder="bottom text" oninput="sync('p-bottom', this.value)">
                    <button class="btn-large" onclick="saveMeme()">publish</button>
                </div>
            </div>
        </div>
    </div>

    <div id="scene-archive" class="scene">
        <div class="pane" id="archive-left" style="width: 100%;">
            <div class="top-bar-area">
                <div class="nav-pill-wrapper">
                    <div class="white-pill" onclick="toggleDrop('drop-arch')"><span>archive</span><span>↓</span></div>
                    <div id="drop-arch" class="dropdown-menu">
                        <div class="dropdown-item" onclick="go('scene-home')">home</div>
                        <div class="dropdown-item" onclick="go('scene-create')">create</div>
                    </div>
                </div>
            </div>
            <div class="view-mode-tabs">
                <button class="tab-btn active" id="tab-icons" onclick="setMode('icons')">memes</button>
                <button class="tab-btn" id="tab-nicks" onclick="setMode('nicks')">nicknames</button>
            </div>
            <div id="archive-list" class="archive-grid grid-cols-full"></div>
        </div>
        <div class="pane hidden" id="archive-right" style="width: 0%;">
             <div class="top-bar-area"><button class="circle-btn" onclick="closeDetail()">×</button></div>
             <div class="editor-box"><div class="canvas-container"><img id="det-img"><div id="det-top" class="meme-text t-top"></div><div id="det-bottom" class="meme-text t-bottom"></div></div></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyChZzoxs-mGsb4D3jn4zaEEsyzVl5Bx_w8",
            authDomain: "kami-and-diana.firebaseapp.com",
            projectId: "kami-and-diana",
            storageBucket: "kami-and-diana.firebasestorage.app",
            messagingSenderId: "1094907925396",
            appId: "1:1094907925396:web:0771d0a2d9668a6f3df581"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const templates = [
            '1.jpg', '2.png', '3.jpeg', '4.jpeg', '5.jpg', '6.png', '7.png', 
            '8.jpeg', '9.jpeg', '10.jpeg', '11.jpeg', '12.jpeg', '13.jpeg', 
            '14.jpeg', '15.jpeg', '16.jpeg', '17.jpeg', '18.jpeg', '19.jpeg', 
            '20.jpeg', '21.jpeg', '22.jpeg', '23.jpeg', '24.jpeg', '25.jpeg', 
            '26.jpeg', '27.jpeg'
        ];

        let currentMode = 'icons'; let currentMemes = []; let activeTemplate = '';
        const magicPalette = ['#D141C8', '#41D1A5', '#D17C41', '#416ED1', '#D1C841', '#A541D1', '#7CD141', '#E5D3B3', '#FF4B2B', '#FFD700', '#1E90FF', '#32CD32'];

        function colorPanes(p1, p2 = null) {
            const c1 = magicPalette[Math.floor(Math.random() * magicPalette.length)];
            document.getElementById(p1).style.backgroundColor = c1;
            if (p2) document.getElementById(p2).style.backgroundColor = magicPalette[Math.floor(Math.random() * magicPalette.length)];
        }

        async function init() {
            await firebase.auth().signInAnonymously();
            colorPanes('pane-home');
            loadData();
            renderTemplates();
        }

        function renderTemplates() {
            const g = document.getElementById('create-grid-view');
            g.innerHTML = templates.map(t => `<div class="meme-icon-card" onclick="showEditor('${t}')"><img src="${t}"></div>`).join('');
        }

        function loadData() {
            db.collection("exhibition_memes").onSnapshot(snap => {
                currentMemes = snap.docs.map(d => d.data());
                renderArchive();
            });
        }

        function go(id) {
            document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'scene-create') colorPanes('create-left', 'create-right');
            if(id === 'scene-archive') colorPanes('archive-left');
        }

        function toggleDrop(id) { document.getElementById(id).classList.toggle('show'); }
        function showEditor(t) {
            activeTemplate = t; document.getElementById('edit-img').src = t;
            document.getElementById('create-grid-view').classList.add('hidden');
            document.getElementById('create-editor-view').classList.remove('hidden');
        }
        function hideEditor() {
            document.getElementById('create-grid-view').classList.remove('hidden');
            document.getElementById('create-editor-view').classList.add('hidden');
        }
        function sync(id, val) { document.getElementById(id).innerText = val; }

        async function saveMeme() {
            await db.collection("exhibition_memes").add({
                template: activeTemplate, nickname: document.getElementById('in-nick').value || 'anon',
                topText: document.getElementById('in-top').value,
                bottomText: document.getElementById('in-bottom').value,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            go('scene-archive');
        }

        function setMode(m) { currentMode = m; renderArchive(); }
        function renderArchive() {
            const list = document.getElementById('archive-list');
            list.innerHTML = currentMemes.map(m => `
                <div class="${currentMode === 'nicks' ? 'nick-card' : 'meme-icon-card'}">
                    ${currentMode === 'icons' ? `<img src="${m.template}">` : m.nickname}
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>
